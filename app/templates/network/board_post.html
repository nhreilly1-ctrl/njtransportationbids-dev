{% extends "network/base.html" %}
{% block title %}Post to Board — NJ Transportation Bids{% endblock %}
{% block net_content %}

<div style="max-width:640px;">
  <div style="margin-bottom:1rem;">
    <a href="{{ url_for('network.board') }}" style="font-size:13px;color:var(--text2);text-decoration:none;">← Board</a>
  </div>
  <h1 style="font-size:18px;font-weight:500;margin-bottom:1.25rem;">Post to the bid board</h1>

  <form method="post">
    <div class="form-group">
      <label>Post type</label>
      <select name="post_type" style="width:100%;height:40px;font-size:14px;padding:0 12px;border:0.5px solid var(--border2);border-radius:var(--r);background:var(--bg);color:var(--t);">
        {% for k,v in post_types.items() %}
          <option value="{{ k }}">{{ v }}</option>
        {% endfor %}
      </select>
    </div>

    <div class="form-group">
      <label>Title <span style="color:var(--text3);font-weight:400;">(be specific — include project name, agency, scope)</span></label>
      <input type="text" name="title" required placeholder="e.g. Seeking concrete sub — NJDOT TP-815, Monmouth Co.">
    </div>

    <div class="form-group">
      <label>Description</label>
      <textarea name="body" rows="5" style="width:100%;font-size:14px;padding:10px 12px;border:0.5px solid var(--border2);border-radius:var(--r);background:var(--bg);color:var(--t);resize:vertical;"
                placeholder="Scope, requirements, how to respond, any relevant details..."></textarea>
    </div>

    <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;">
      <div class="form-group">
        <label>County</label>
        <select name="county" style="width:100%;height:40px;font-size:14px;padding:0 12px;border:0.5px solid var(--border2);border-radius:var(--r);background:var(--bg);color:var(--t);">
          <option value="">Statewide</option>
          {% for c in counties %}<option value="{{ c }}">{{ c }}</option>{% endfor %}
        </select>
      </div>
      <div class="form-group">
        <label>Estimated project value</label>
        <input type="text" name="est_value" placeholder="e.g. $4.2M">
      </div>
    </div>

    <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;">
      <div class="form-group">
        <label>Sub bid deadline</label>
        <input type="text" name="sub_due" placeholder="e.g. Apr 18, 2026">
      </div>
      <div class="form-group">
        <label>Owner bid date</label>
        <input type="text" name="owner_due" placeholder="e.g. Apr 28, 2026">
      </div>
    </div>

    <div class="form-group">
      <label>Trades needed / offered</label>
      <div style="display:flex;flex-wrap:wrap;gap:6px;padding:10px;border:0.5px solid var(--border2);border-radius:var(--r);background:var(--bg2);">
        {% for t in trades %}
          <label style="display:flex;align-items:center;gap:5px;font-size:13px;cursor:pointer;">
            <input type="checkbox" name="trades" value="{{ t }}"> {{ t }}
          </label>
        {% endfor %}
      </div>
    </div>

    <div style="display:flex;gap:1.5rem;margin-bottom:1rem;">
      <label style="display:flex;align-items:center;gap:6px;font-size:13px;cursor:pointer;">
        <input type="checkbox" name="dbe_required"> DBE participation required
      </label>
      <label style="display:flex;align-items:center;gap:6px;font-size:13px;cursor:pointer;">
        <input type="checkbox" name="bond_required"> Bonding required from subs
      </label>
    </div>

    <div class="form-group">
      <label>Contact email <span style="color:var(--text3);font-weight:400;">(shown on post)</span></label>
      <input type="email" name="contact_email" placeholder="{{ user.email }}">
    </div>

    <div style="display:flex;gap:10px;margin-top:.5rem;">
      <button type="submit" class="btn btn-primary">Publish post</button>
      <a href="{{ url_for('network.board') }}" class="btn">Cancel</a>
    </div>
  </form>
</div>
{% endblock %}
