{% extends "network/base.html" %}
{% block title %}Submit Bid Result — NJ Transportation Bids{% endblock %}
{% block net_content %}
<div style="max-width:640px;">
  <div style="margin-bottom:1rem;"><a href="{{ url_for('network.bid_results') }}" style="font-size:13px;color:var(--text2);text-decoration:none;">← Bid results</a></div>
  <h1 style="font-size:18px;font-weight:500;margin-bottom:.5rem;">Submit a bid result</h1>
  <p style="font-size:13px;color:var(--text2);margin-bottom:1.25rem;">Help the community calibrate estimates. Results are reviewed before appearing publicly.</p>
  <form method="post">
    <div class="form-group"><label>Contract title</label>
      <input type="text" name="contract_title" required placeholder="e.g. Route 9 Bridge Rehabilitation, Monmouth County"></div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;">
      <div class="form-group"><label>Contract number</label><input type="text" name="contract_number" placeholder="e.g. T200.901"></div>
      <div class="form-group"><label>Bid date</label><input type="text" name="bid_date" placeholder="e.g. 04/15/2026"></div>
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;">
      <div class="form-group"><label>Awarding agency</label>
        <input type="text" name="owner_agency" required placeholder="e.g. NJDOT, NJ Turnpike, Camden County"></div>
      <div class="form-group"><label>County</label>
        <select name="county" style="width:100%;height:40px;font-size:14px;padding:0 12px;border:0.5px solid var(--border2);border-radius:var(--r);background:var(--bg);color:var(--t);">
          <option value="">Statewide</option>
          {% for c in counties %}<option>{{ c }}</option>{% endfor %}
        </select>
      </div>
    </div>
    <div class="form-group"><label>Awarded to (company name)</label>
      <input type="text" name="awarded_to" placeholder="e.g. Reilly General Contracting"></div>
    <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:10px;">
      <div class="form-group"><label>Award / low bid</label><input type="text" name="award_amount" placeholder="$4,200,000"></div>
      <div class="form-group"><label>2nd low bid</label><input type="text" name="second_bid" placeholder="$4,650,000"></div>
      <div class="form-group"><label>Engineer estimate</label><input type="text" name="engineer_estimate" placeholder="$4,500,000"></div>
      <div class="form-group"><label>No. of bidders</label><input type="number" name="num_bidders" min="1" max="50" placeholder="5"></div>
    </div>
    <div class="form-group"><label>Source / reference URL <span style="color:var(--text3);font-weight:400;">(bid tabulation link if public)</span></label>
      <input type="url" name="source_url" placeholder="https://..."></div>
    <div class="form-group"><label>Notes <span style="color:var(--text3);font-weight:400;">(optional)</span></label>
      <textarea name="notes" rows="3" style="width:100%;font-size:14px;padding:10px 12px;border:0.5px solid var(--border2);border-radius:var(--r);background:var(--bg);color:var(--t);resize:vertical;" placeholder="e.g. All bids came in significantly over estimate, tight labor market..."></textarea>
    </div>
    <div style="display:flex;gap:10px;">
      <button type="submit" class="btn btn-primary">Submit for review</button>
      <a href="{{ url_for('network.bid_results') }}" class="btn">Cancel</a>
    </div>
  </form>
</div>
{% endblock %}
