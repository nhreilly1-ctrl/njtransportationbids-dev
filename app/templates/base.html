<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}NJ Transportation Bids{% endblock %}</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #ffffff; --bg2: #f7f7f5; --bg3: #f0efe8;
      --text: #1a1a18; --text2: #5a5a56; --text3: #8a8a84;
      --border: rgba(0,0,0,0.10); --border2: rgba(0,0,0,0.18);
      --green-bg: #eaf3de; --green-text: #3b6d11;
      --amber-bg: #faeeda; --amber-text: #854f0b;
      --red-bg: #fcebeb;   --red-text: #a32d2d;
      --gray-bg: #f1efe8;  --gray-text: #5f5e5a;
      --blue-bg: #e6f1fb;  --blue-text: #185fa5;
      --radius: 8px; --radius-lg: 12px;
    }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
           background: var(--bg3); color: var(--text); font-size: 15px; line-height: 1.6; }

    /* Nav */
    .nav { background: var(--bg); border-bottom: 0.5px solid var(--border);
           padding: 0 1.5rem; display: flex; align-items: center; gap: 2rem; height: 52px; }
    .nav-brand { font-size: 15px; font-weight: 500; color: var(--text); text-decoration: none; }
    .nav-links { display: flex; gap: 0; }
    .nav-links a { font-size: 13px; color: var(--text2); text-decoration: none;
                   padding: 0 14px; height: 52px; display: flex; align-items: center;
                   border-bottom: 2px solid transparent; }
    .nav-links a:hover { color: var(--text); }
    .nav-links a.active { color: var(--text); border-bottom-color: var(--text); font-weight: 500; }
    .nav-right { margin-left: auto; display: flex; align-items: center; gap: 10px; }
    .nav-admin { font-size: 12px; color: var(--text3); text-decoration: none;
                 padding: 5px 10px; border: 0.5px solid var(--border2); border-radius: var(--radius);
                 background: var(--bg2); }
    .nav-admin:hover { background: var(--bg3); color: var(--text2); }

    /* Layout */
    .container { max-width: 960px; margin: 0 auto; padding: 1.5rem 1.25rem; }
    .page-header { margin-bottom: 1.5rem; }
    .page-header h1 { font-size: 20px; font-weight: 500; margin-bottom: 4px; }
    .page-header p  { font-size: 13px; color: var(--text2); }

    /* Stat cards */
    .stats-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-bottom: 1.5rem; }
    .stat-card { background: var(--bg2); border-radius: var(--radius); padding: 0.8rem 1rem; }
    .stat-card .num { font-size: 24px; font-weight: 500; }
    .stat-card .lbl { font-size: 12px; color: var(--text2); margin-top: 2px; }
    .stat-green { color: var(--green-text); }
    .stat-amber { color: var(--amber-text); }
    .stat-red   { color: var(--red-text); }

    /* Badges */
    .badge { display: inline-flex; align-items: center; font-size: 11px; font-weight: 500;
             padding: 3px 8px; border-radius: 20px; white-space: nowrap; }
    .badge-open    { background: var(--green-bg); color: var(--green-text); }
    .badge-expired { background: var(--gray-bg);  color: var(--gray-text); }
    .badge-noise   { background: var(--red-bg);   color: var(--red-text); }
    .badge-nodate  { background: var(--amber-bg); color: var(--amber-text); }
    .badge-access  { background: var(--bg2); color: var(--text2); font-weight: 400; }
    .badge-approved { background: var(--blue-bg); color: var(--blue-text); }

    /* Toolbar */
    .toolbar { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; margin-bottom: 1.25rem; }
    .toolbar input, .toolbar select {
      font-size: 13px; height: 34px; padding: 0 10px;
      border: 0.5px solid var(--border2); border-radius: var(--radius);
      background: var(--bg); color: var(--text); }
    .toolbar input { min-width: 220px; flex: 1; }

    /* Buttons */
    .btn { display: inline-flex; align-items: center; gap: 5px; font-size: 13px;
           height: 34px; padding: 0 14px; border-radius: var(--radius);
           border: 0.5px solid var(--border2); background: var(--bg);
           color: var(--text); cursor: pointer; text-decoration: none; }
    .btn:hover { background: var(--bg2); }
    .btn-primary { background: var(--text); color: var(--bg); border-color: var(--text); }
    .btn-primary:hover { opacity: 0.85; }
    .btn-danger  { color: var(--red-text); border-color: var(--red-text); }
    .btn-danger:hover  { background: var(--red-bg); }
    .btn-sm { height: 28px; padding: 0 10px; font-size: 12px; }

    /* Section label */
    .section-label { font-size: 11px; font-weight: 500; color: var(--text3);
                     text-transform: uppercase; letter-spacing: .06em;
                     margin: 1.25rem 0 .6rem; }

    /* Bid card */
    .bid-card { background: var(--bg); border: 0.5px solid var(--border);
                border-radius: var(--radius-lg); padding: 1rem 1.25rem;
                margin-bottom: 8px; display: flex; gap: 1rem; align-items: flex-start;
                transition: border-color .15s; }
    .bid-card:hover { border-color: var(--border2); }
    .bid-card.noise { opacity: .6; border-style: dashed; }
    .bid-card.soon  { border-left: 3px solid var(--red-text); border-radius: 0 var(--radius-lg) var(--radius-lg) 0; }
    .bid-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; margin-top: 6px; }
    .dot-green { background: #639922; } .dot-amber { background: #ba7517; } .dot-red { background: #e24b4a; }
    .bid-main { flex: 1; min-width: 0; }
    .bid-title { font-size: 14px; font-weight: 500; color: var(--text); text-decoration: none;
                 display: block; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
                 margin-bottom: 4px; }
    .bid-title:hover { color: var(--blue-text); }
    .bid-meta  { font-size: 12px; color: var(--text2); margin-bottom: 8px; }
    .bid-tags  { display: flex; gap: 6px; flex-wrap: wrap; }
    .bid-due   { min-width: 90px; text-align: right; flex-shrink: 0; }
    .bid-due .due-label { font-size: 11px; color: var(--text3); display: block; }
    .bid-due .due-date  { font-size: 13px; font-weight: 500; display: block; }
    .bid-due.soon-due .due-date { color: var(--red-text); }

    /* Divider */
    .divider { height: 0.5px; background: var(--border); margin: 1.25rem 0; }

    /* Flashes */
    .flash { padding: .7rem 1rem; border-radius: var(--radius); margin-bottom: 1rem;
             font-size: 13px; background: var(--blue-bg); color: var(--blue-text); }
    .flash-error { background: var(--red-bg); color: var(--red-text); }

    /* Forms */
    .form-group { margin-bottom: 1rem; }
    .form-group label { display: block; font-size: 13px; color: var(--text2); margin-bottom: 5px; }
    .form-group input { width: 100%; font-size: 14px; height: 40px; padding: 0 12px;
                        border: 0.5px solid var(--border2); border-radius: var(--radius);
                        background: var(--bg); color: var(--text); }
    .form-group input:focus { outline: none; border-color: #378add; box-shadow: 0 0 0 3px rgba(55,138,221,.15); }

    /* Admin table */
    .tbl-wrap { overflow-x: auto; }
    table.admin-tbl { width: 100%; border-collapse: collapse; font-size: 13px; }
    .admin-tbl th { font-size: 11px; font-weight: 500; color: var(--text2); text-align: left;
                    padding: 8px 10px; border-bottom: 0.5px solid var(--border);
                    background: var(--bg2); text-transform: uppercase; letter-spacing: .05em; }
    .admin-tbl td { padding: 9px 10px; border-bottom: 0.5px solid var(--border);
                    vertical-align: middle; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .admin-tbl tr:hover td { background: var(--bg2); }
    .admin-tbl tr.selected td { background: var(--blue-bg); }
    .col-check  { width: 36px; }
    .col-dot    { width: 30px; }
    .col-title  { max-width: 280px; }
    .col-source { width: 130px; }
    .col-due    { width: 100px; }
    .col-status { width: 90px; }
    .col-action { width: 100px; }

    /* Selection bar */
    .sel-bar { display: none; align-items: center; gap: 10px;
               background: var(--blue-bg); border: 0.5px solid #b5d4f4;
               border-radius: var(--radius); padding: 8px 14px;
               margin-bottom: 10px; font-size: 13px; color: var(--blue-text); }
    .sel-bar.visible { display: flex; }
    .sel-bar .sel-count { font-weight: 500; }
    .sel-bar .spacer { flex: 1; }

    /* Filter pills */
    .filter-pills { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 1rem; }
    .pill { font-size: 12px; padding: 4px 12px; border-radius: 20px;
            border: 0.5px solid var(--border2); background: var(--bg);
            cursor: pointer; color: var(--text2); text-decoration: none; }
    .pill:hover { background: var(--bg2); }
    .pill.active { background: var(--text); color: var(--bg); border-color: var(--text); }

    /* Source card */
    .source-card { background: var(--bg); border: 0.5px solid var(--border);
                   border-radius: var(--radius-lg); padding: .9rem 1.1rem;
                   margin-bottom: 8px; display: flex; align-items: center; gap: 12px; }
    .h-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
    .h-good { background: #639922; } .h-warn { background: #ba7517; } .h-bad { background: #e24b4a; }
    .source-name { font-size: 13px; font-weight: 500; flex: 1; }
    .source-meta { font-size: 12px; color: var(--text2); }

    /* Login card */
    .login-wrap { min-height: 100vh; display: flex; align-items: center; justify-content: center; }
    .login-card { background: var(--bg); border: 0.5px solid var(--border);
                  border-radius: var(--radius-lg); padding: 2rem; width: 100%; max-width: 360px; }
    .login-card h1 { font-size: 17px; font-weight: 500; margin-bottom: 1.5rem; }

    @media (max-width: 600px) {
      .stats-row { grid-template-columns: repeat(2,1fr); }
      .nav-links a { padding: 0 8px; }
    }
  </style>
</head>
<body>

<nav class="nav">
  <a href="{{ url_for('index') }}" class="nav-brand">NJ Transportation Bids</a>
  <div class="nav-links">
    <a href="{{ url_for('opportunities') }}"
       class="{{ 'active' if request.endpoint == 'opportunities' else '' }}">Opportunities</a>
    <a href="{{ url_for('sources') }}"
       class="{{ 'active' if request.endpoint == 'sources' else '' }}">Sources</a>
  </div>
  <div class="nav-right">
    {% if session.get('admin') %}
      <a href="{{ url_for('admin_dashboard') }}" class="nav-admin">Admin</a>
      <a href="{{ url_for('admin_logout') }}" class="nav-admin">Log out</a>
    {% else %}
      <a href="{{ url_for('admin_login') }}" class="nav-admin">Admin</a>
    {% endif %}
  </div>
</nav>

<div class="container">
  {% with msgs = get_flashed_messages(with_categories=True) %}
    {% for cat, msg in msgs %}
      <div class="flash {{ 'flash-error' if cat == 'error' else '' }}">{{ msg }}</div>
    {% endfor %}
  {% endwith %}
  {% block content %}{% endblock %}
</div>

</body>
</html>
