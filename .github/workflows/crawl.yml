name: Daily Crawl

on:
  schedule:
    - cron: '0 10 * * 1-5'   # 6:00 AM ET weekdays
    - cron: '0 22 * * 1-5'   # 6:00 PM ET weekdays
  workflow_dispatch:           # Manual trigger from GitHub Actions tab

jobs:
  crawl:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests beautifulsoup4 lxml playwright

      - name: Install Playwright browser
        run: playwright install chromium --with-deps

      - name: Run crawler
        run: python3 simple_crawl.py

      - name: Commit updated data if changed
        run: |
          git config user.name "crawl-bot"
          git config user.email "bot@njtransportationbids.com"
          git add data/opportunities.json data/notices/
          if git diff --cached --quiet; then
            echo "No changes — skipping commit"
          else
            git commit -m "chore: crawl update $(date -u '+%Y-%m-%d %H:%M UTC')"
            git push
          fi
